name: Update README Time

on:
  schedule:
    # Runs every day at 00:10 UTC = 09:10 KST
    - cron: "10 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README timestamp
        run: |
          NOW=$(TZ="Asia/Seoul" date +"%Y-%m-%d %H:%M:%S KST")

          sed -i "/<!-- UPDATE_TIME_START -->/,/<!-- UPDATE_TIME_END -->/c\
          <!-- UPDATE_TIME_START -->\nLast updated: ${NOW}\n<!-- UPDATE_TIME_END -->" README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update README timestamp"
            git push
          fi
